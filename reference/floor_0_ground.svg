<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ground Floor Plan — 4×25m Tubehouse
  =====================================
  Coordinate system : 1 SVG unit = 1 mm
  Drawing scale     : 1:100  (displayed at 1px = 10mm)
  Origin (0,0)      : front-left exterior corner
  Y-axis            : positive = toward rear of plot

  Zone layout (Y axis, all dims in mm):
    0    – 200   : front exterior wall
    200  – 5000  : PARKING / ENTRANCE  (4800mm clear)
    5000 – 5100  : partition wall
    5100 – 15000 : COMMERCIAL / FOR RENT  (9900mm clear)
    15000– 15100 : partition wall
    15100– 19000 : CORE — lift + stair + light well  (3900mm clear)
    19000– 19100 : partition wall (with door opening)
    19100– 23000 : UTILITY + BATHROOM  (3900mm clear)
    23000– 23100 : partition wall (with door opening)
    23100– 24800 : REAR LIGHT WELL  (1700mm clear)
    24800– 25000 : rear exterior wall

  Width layout (X axis, all dims in mm):
    0    – 200   : left exterior wall
    200  – 3800  : interior  (3600mm clear)
    3800 – 4000  : right exterior wall

  Core zone X divisions:
    200  – 1000  : LIFT SHAFT  (800mm)
    1000 – 1100  : separator wall
    1100 – 2700  : STAIRCASE  (1600mm)
    2700 – 2800  : separator wall
    2800 – 3800  : LIGHT WELL / VOID  (1000mm)

  Utility zone X divisions:
    200  – 2350  : STAFF / UTILITY  (2150mm)
    2350 – 2450  : bathroom wall
    2450 – 3800  : BATHROOM  (1350mm)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-700 -550 5500 27000"
     width="550" height="2700"
     font-family="Arial, Helvetica, sans-serif">

  <title>Ground Floor Plan — 4x25m Tubehouse</title>

  <!-- ═══════════════════════════════════════════════════
       DEFS
  ═══════════════════════════════════════════════════ -->
  <defs>
    <!-- 1m × 1m grid -->
    <pattern id="grid1m" width="1000" height="1000" patternUnits="userSpaceOnUse">
      <rect width="1000" height="1000" fill="#f8fafc"/>
      <path d="M1000 0 H0 V1000" fill="none" stroke="#dde3ea" stroke-width="10"/>
    </pattern>
    <!-- Bathroom diagonal cross-hatch -->
    <pattern id="wetHatch" width="200" height="200" patternUnits="userSpaceOnUse">
      <line x1="0"   y1="0"   x2="200" y2="200" stroke="#93c5fd" stroke-width="18" opacity="0.5"/>
      <line x1="0"   y1="200" x2="200" y2="0"   stroke="#93c5fd" stroke-width="18" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════════════════
       SHEET TITLE
  ═══════════════════════════════════════════════════ -->
  <text x="2000" y="-320" text-anchor="middle"
        font-size="280" font-weight="700" fill="#1e293b" letter-spacing="30">GROUND FLOOR PLAN</text>
  <text x="2000" y="-120" text-anchor="middle"
        font-size="145" fill="#64748b">4.00m × 25.00m  ·  SCALE 1:100  ·  ALL DIMENSIONS IN mm</text>

  <!-- ═══════════════════════════════════════════════════
       BACKGROUND / GRID
  ═══════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="4000" height="25000" fill="url(#grid1m)"/>

  <!-- ═══════════════════════════════════════════════════
       ROOM FILLS
  ═══════════════════════════════════════════════════ -->
  <!-- Parking -->
  <rect x="200" y="200" width="3600" height="4800" fill="#e8ecf1" opacity="0.85"/>
  <!-- Commercial -->
  <rect x="200" y="5100" width="3600" height="9900" fill="#ffffff"/>
  <!-- Lift shaft -->
  <rect x="200" y="15100" width="800" height="3900" fill="#cbd5e1"/>
  <!-- Staircase -->
  <rect x="1100" y="15100" width="1600" height="3900" fill="#e9edf2"/>
  <!-- Core light well -->
  <rect x="2800" y="15100" width="1000" height="3900" fill="#eff6ff"/>
  <!-- Staff / utility -->
  <rect x="200" y="19100" width="2150" height="3900" fill="#fafafa"/>
  <!-- Bathroom (with hatch) -->
  <rect x="2450" y="19100" width="1350" height="3900" fill="#dbeafe" opacity="0.45"/>
  <rect x="2450" y="19100" width="1350" height="3900" fill="url(#wetHatch)"/>
  <!-- Rear light well -->
  <rect x="200" y="23100" width="3600" height="1700" fill="#eff6ff"/>

  <!-- ═══════════════════════════════════════════════════
       WALLS
  ═══════════════════════════════════════════════════ -->
  <!-- Left exterior wall -->
  <rect x="0" y="0" width="200" height="25000" fill="#334155"/>
  <!-- Right exterior wall -->
  <rect x="3800" y="0" width="200" height="25000" fill="#334155"/>
  <!-- Rear exterior wall -->
  <rect x="0" y="24800" width="4000" height="200" fill="#334155"/>

  <!-- Front wall — garage opening x=600 to x=3400 (2800mm clear) -->
  <rect x="0"    y="0" width="600"  height="200" fill="#334155"/>
  <rect x="3400" y="0" width="600"  height="200" fill="#334155"/>

  <!-- Horizontal interior partitions (100mm thick) -->
  <!-- Parking / commercial -->
  <rect x="200" y="5000" width="3600" height="100" fill="#334155"/>
  <!-- Commercial / core -->
  <rect x="200" y="15000" width="3600" height="100" fill="#334155"/>
  <!-- Core / utility — with door opening 1100-1900 (800mm) -->
  <rect x="200"  y="19000" width="900"  height="100" fill="#334155"/>
  <rect x="1900" y="19000" width="2900" height="100" fill="#334155"/>
  <!-- Utility / rear void — with door opening 200-1000 (800mm) -->
  <rect x="1000" y="23000" width="2800" height="100" fill="#334155"/>

  <!-- Vertical interior walls in core zone -->
  <rect x="1000" y="15100" width="100" height="3900" fill="#334155"/>
  <rect x="2700" y="15100" width="100" height="3900" fill="#334155"/>

  <!-- Bathroom wall in utility zone -->
  <rect x="2350" y="19100" width="100" height="3900" fill="#334155"/>

  <!-- ═══════════════════════════════════════════════════
       DOOR — garage opening indicator
  ═══════════════════════════════════════════════════ -->
  <line x1="600" y1="15" x2="3400" y2="15"
        stroke="#64748b" stroke-width="22" stroke-dasharray="140 90"/>
  <text x="2000" y="175" text-anchor="middle"
        font-size="130" fill="#64748b">GARAGE OPENING  2800</text>

  <!-- ═══════════════════════════════════════════════════
       DOOR — commercial zone (front partition, hinged left)
       Opening: x=200-1000, y=5000-5100
       Door leaf: vertical when open (swings into parking)
  ═══════════════════════════════════════════════════ -->
  <!-- gap already cut by not drawing that section of wall -->
  <!-- cover the wall area where door sits -->
  <rect x="200" y="5000" width="800" height="100" fill="#e8ecf1"/>
  <!-- door leaf (closed position shown as thin line) -->
  <line x1="200" y1="5000" x2="1000" y2="5000" stroke="#334155" stroke-width="30"/>
  <!-- swing arc (opens into parking zone = toward lower y) -->
  <path d="M 1000,5000 A 800,800 0 0,0 200,4200"
        fill="none" stroke="#64748b" stroke-width="22" stroke-dasharray="70 45"/>

  <!-- ═══════════════════════════════════════════════════
       DOOR — core/utility partition (hinged left, opens into utility)
  ═══════════════════════════════════════════════════ -->
  <!-- gap: x=1100-1900, y=19000-19100 (already cut in wall) -->
  <line x1="1100" y1="19100" x2="1900" y2="19100" stroke="#334155" stroke-width="30"/>
  <path d="M 1100,19100 A 800,800 0 0,1 1100,19900"
        fill="none" stroke="#64748b" stroke-width="22" stroke-dasharray="70 45"/>

  <!-- ═══════════════════════════════════════════════════
       DOOR — utility/rear partition (hinged at x=200, opens into rear void)
  ═══════════════════════════════════════════════════ -->
  <!-- opening: x=200-1000, y=23000-23100 -->
  <rect x="200" y="23000" width="800" height="100" fill="#fafafa"/>
  <line x1="200" y1="23100" x2="1000" y2="23100" stroke="#334155" stroke-width="30"/>
  <path d="M 200,23100 A 800,800 0 0,1 1000,23100"
        fill="none" stroke="#64748b" stroke-width="22" stroke-dasharray="70 45"/>

  <!-- ═══════════════════════════════════════════════════
       LIFT SHAFT — diagonal X
  ═══════════════════════════════════════════════════ -->
  <line x1="200"  y1="15100" x2="1000" y2="19000" stroke="#475569" stroke-width="28"/>
  <line x1="1000" y1="15100" x2="200"  y2="19000" stroke="#475569" stroke-width="28"/>

  <!-- ═══════════════════════════════════════════════════
       STAIRCASE — tread lines + UP arrow
       Tread depth: 280mm, 13 treads across 3640mm (y=15100 to y=18740)
  ═══════════════════════════════════════════════════ -->
  <line x1="1100" y1="15380" x2="2700" y2="15380" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="15660" x2="2700" y2="15660" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="15940" x2="2700" y2="15940" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="16220" x2="2700" y2="16220" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="16500" x2="2700" y2="16500" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="16780" x2="2700" y2="16780" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="17060" x2="2700" y2="17060" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="17340" x2="2700" y2="17340" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="17620" x2="2700" y2="17620" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="17900" x2="2700" y2="17900" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="18180" x2="2700" y2="18180" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="18460" x2="2700" y2="18460" stroke="#7a8fa6" stroke-width="22"/>
  <line x1="1100" y1="18740" x2="2700" y2="18740" stroke="#7a8fa6" stroke-width="22"/>
  <!-- UP arrow -->
  <line x1="1900" y1="18850" x2="1900" y2="15450" stroke="#475569" stroke-width="40"/>
  <polygon points="1900,15250 1760,15560 2040,15560" fill="#475569"/>
  <text x="2050" y="18860" font-size="195" font-weight="700" fill="#475569">UP</text>

  <!-- ═══════════════════════════════════════════════════
       TOILET SYMBOL (plan view)
       Position: top-left of bathroom zone
  ═══════════════════════════════════════════════════ -->
  <!-- cistern -->
  <rect x="2600" y="19200" width="380" height="190" rx="25"
        fill="white" stroke="#64748b" stroke-width="28"/>
  <!-- bowl -->
  <ellipse cx="2790" cy="19700" rx="215" ry="275"
           fill="white" stroke="#64748b" stroke-width="28"/>

  <!-- SINK SYMBOL -->
  <rect x="3100" y="22250" width="450" height="420" rx="45"
        fill="white" stroke="#64748b" stroke-width="28"/>
  <circle cx="3325" cy="22460" r="58" fill="#94a3b8"/>

  <!-- ═══════════════════════════════════════════════════
       LIGHT WELL BORDERS (dashed)
  ═══════════════════════════════════════════════════ -->
  <rect x="2800" y="15100" width="1000" height="3900"
        fill="none" stroke="#93c5fd" stroke-width="22" stroke-dasharray="110 55"/>
  <rect x="200" y="23100" width="3600" height="1700"
        fill="none" stroke="#93c5fd" stroke-width="22" stroke-dasharray="110 55"/>

  <!-- ═══════════════════════════════════════════════════
       ROOM LABELS
  ═══════════════════════════════════════════════════ -->
  <!-- Parking -->
  <text x="2000" y="2200" text-anchor="middle"
        font-size="290" font-weight="700" fill="#475569" opacity="0.75">PARKING</text>
  <text x="2000" y="2570" text-anchor="middle"
        font-size="175" fill="#94a3b8">ENTRANCE</text>
  <text x="2000" y="2860" text-anchor="middle"
        font-size="155" fill="#b0bec5">3.60 × 4.80 m = 17.3 m²</text>

  <!-- Commercial -->
  <text x="2000" y="9300" text-anchor="middle"
        font-size="290" font-weight="700" fill="#475569" opacity="0.75">COMMERCIAL</text>
  <text x="2000" y="9680" text-anchor="middle"
        font-size="215" fill="#475569">FOR RENT</text>
  <text x="2000" y="10010" text-anchor="middle"
        font-size="155" fill="#b0bec5">3.60 × 9.90 m = 35.6 m²</text>

  <!-- Lift -->
  <text x="600" y="17150" text-anchor="middle"
        font-size="195" font-weight="700" fill="#334155"
        transform="rotate(90,600,17150)">LIFT</text>

  <!-- Stair -->
  <text x="1900" y="18870" text-anchor="middle"
        font-size="160" fill="#475569">STAIRCASE</text>

  <!-- Core light well -->
  <text x="3300" y="16900" text-anchor="middle"
        font-size="160" fill="#3b82f6" opacity="0.8"
        transform="rotate(90,3300,16900)">LIGHT WELL</text>

  <!-- Staff / utility -->
  <text x="1275" y="20700" text-anchor="middle"
        font-size="250" font-weight="700" fill="#475569" opacity="0.75">UTILITY</text>
  <text x="1275" y="21020" text-anchor="middle"
        font-size="160" fill="#94a3b8">STAFF / STORAGE</text>
  <text x="1275" y="21290" text-anchor="middle"
        font-size="145" fill="#b0bec5">2.15 × 3.90 m = 8.4 m²</text>

  <!-- Bathroom -->
  <text x="3025" y="20750" text-anchor="middle"
        font-size="230" font-weight="700" fill="#3b82f6" opacity="0.85">BATHROOM</text>
  <text x="3025" y="21060" text-anchor="middle"
        font-size="145" fill="#94a3b8">1.35 × 3.90 m = 5.3 m²</text>

  <!-- Rear light well -->
  <text x="2000" y="24020" text-anchor="middle"
        font-size="210" fill="#60a5fa" opacity="0.9">REAR LIGHT WELL</text>
  <text x="2000" y="24290" text-anchor="middle"
        font-size="145" fill="#b0bec5">3.60 × 1.70 m</text>

  <!-- ═══════════════════════════════════════════════════
       DIMENSION LINES
  ═══════════════════════════════════════════════════ -->
  <!-- Total width (above drawing) -->
  <line x1="0" y1="-200" x2="4000" y2="-200" stroke="#64748b" stroke-width="18"/>
  <line x1="0"    y1="-280" x2="0"    y2="-120" stroke="#64748b" stroke-width="18"/>
  <line x1="4000" y1="-280" x2="4000" y2="-120" stroke="#64748b" stroke-width="18"/>
  <text x="2000" y="-215" text-anchor="middle" font-size="165" fill="#64748b" dy="-8">4000</text>

  <!-- Total height (left of drawing) -->
  <line x1="-200" y1="0"     x2="-200" y2="25000" stroke="#64748b" stroke-width="18"/>
  <line x1="-280" y1="0"     x2="-120" y2="0"     stroke="#64748b" stroke-width="18"/>
  <line x1="-280" y1="25000" x2="-120" y2="25000" stroke="#64748b" stroke-width="18"/>
  <text x="-260" y="12500" text-anchor="middle" font-size="165" fill="#64748b"
        transform="rotate(-90,-260,12500)">25000</text>

  <!-- Zone height chain (right side) -->
  <!-- Tick marks at each zone boundary -->
  <line x1="4000" y1="0"     x2="4260" y2="0"     stroke="#94a3b8" stroke-width="14"/>
  <line x1="4000" y1="5000"  x2="4260" y2="5000"  stroke="#94a3b8" stroke-width="14"/>
  <line x1="4000" y1="15000" x2="4260" y2="15000" stroke="#94a3b8" stroke-width="14"/>
  <line x1="4000" y1="19000" x2="4260" y2="19000" stroke="#94a3b8" stroke-width="14"/>
  <line x1="4000" y1="23000" x2="4260" y2="23000" stroke="#94a3b8" stroke-width="14"/>
  <line x1="4000" y1="25000" x2="4260" y2="25000" stroke="#94a3b8" stroke-width="14"/>
  <!-- Vertical dim line -->
  <line x1="4160" y1="0" x2="4160" y2="25000" stroke="#94a3b8" stroke-width="14"/>
  <!-- Zone labels -->
  <text x="4340" y="2580"  font-size="150" fill="#64748b">5000</text>
  <text x="4340" y="10080" font-size="150" fill="#64748b">10000</text>
  <text x="4340" y="17080" font-size="150" fill="#64748b">4000</text>
  <text x="4340" y="21080" font-size="150" fill="#64748b">4000</text>
  <text x="4340" y="24080" font-size="150" fill="#64748b">2000</text>

  <!-- ═══════════════════════════════════════════════════
       NORTH ARROW
  ═══════════════════════════════════════════════════ -->
  <g transform="translate(4650, 1100)">
    <circle r="320" fill="white" stroke="#334155" stroke-width="28"/>
    <polygon points="0,-275  65,-45  0,0"  fill="#334155"/>
    <polygon points="0,-275 -65,-45  0,0"  fill="#94a3b8"/>
    <polygon points="0, 275  65, 45  0,0"  fill="#94a3b8"/>
    <polygon points="0, 275 -65, 45  0,0"  fill="#334155"/>
    <text x="0" y="-355" text-anchor="middle"
          font-size="240" font-weight="700" fill="#334155">N</text>
  </g>

  <!-- ═══════════════════════════════════════════════════
       TITLE BLOCK
  ═══════════════════════════════════════════════════ -->
  <rect x="0" y="25350" width="4000" height="580"
        fill="#f1f5f9" stroke="#334155" stroke-width="20"/>
  <line x1="2000" y1="25350" x2="2000" y2="25930" stroke="#cbd5e1" stroke-width="14"/>
  <line x1="0"    y1="25630" x2="4000" y2="25630" stroke="#cbd5e1" stroke-width="12"/>

  <text x="100" y="25530" font-size="165" font-weight="700" fill="#334155">PROJECT: 4×25m Tubehouse</text>
  <text x="100" y="25720" font-size="135" fill="#64748b">Location: Urban Narrow Lot  ·  Status: CONCEPT</text>
  <text x="100" y="25880" font-size="120" fill="#94a3b8">Date: 2026-03</text>

  <text x="2100" y="25530" font-size="165" font-weight="700" fill="#334155">Sheet: A-101  ·  GROUND FLOOR</text>
  <text x="2100" y="25720" font-size="135" fill="#64748b">Scale: 1:100  ·  1 unit = 1 mm</text>
  <text x="2100" y="25880" font-size="120" fill="#94a3b8">Drawn: AI-Assisted</text>

</svg>
